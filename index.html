<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13;
      --card: #1a1a22;
      --border: #2a2a36;
      --accent: #7c6fff;
      --accent2: #ff6f91;
      --text: #e8e8f0;
      --muted: #7a7a90;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 32px 16px;
    }
    header {
      text-align: center;
      margin-bottom: 32px;
    }
    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p { color: var(--muted); margin-top: 6px; font-size: 0.9rem; }

    .layout {
      display: flex;
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .todo-section { flex: 1; }
    .ai-section { width: 380px; }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .input-row input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: var(--accent); }
    .input-row input::placeholder { color: var(--muted); }
    .input-row button {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      padding: 13px 20px;
      color: #fff;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .input-row button:hover { opacity: 0.85; }

    .stats {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }
    .stat {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }
    .stat .num {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
    }
    .stat .label { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .filter-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      color: var(--muted);
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .task-list { display: flex; flex-direction: column; gap: 8px; }
    .task-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideIn 0.2s ease;
      transition: border-color 0.2s;
    }
    .task-item:hover { border-color: var(--accent); }
    .task-item.done { opacity: 0.5; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .check-btn {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      color: transparent;
      font-size: 11px;
    }
    .task-item.done .check-btn {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .task-title { flex: 1; font-size: 0.9rem; }
    .task-item.done .task-title { text-decoration: line-through; color: var(--muted); }
    .del-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s;
    }
    .del-btn:hover { color: var(--accent2); }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 40px 0;
      font-size: 0.9rem;
    }
    .empty span { display: block; font-size: 2rem; margin-bottom: 10px; }

    /* AI Chat */
    .ai-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      height: 600px;
    }
    .ai-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .ai-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80;
    }
    .ai-header span {
      font-weight: 600;
      font-size: 0.9rem;
    }
    .ai-header small { color: var(--muted); font-size: 0.75rem; margin-left: auto; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.875rem;
      line-height: 1.5;
      animation: slideIn 0.2s ease;
    }
    .msg.user {
      background: var(--accent);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg.ai {
      background: #22222e;
      color: var(--text);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }
    .msg.typing { color: var(--muted); font-style: italic; }

    .chat-input-row {
      padding: 14px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    .chat-input-row input {
      flex: 1;
      background: #22222e;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 0.875rem;
      font-family: 'Inter', sans-serif;
      outline: none;
    }
    .chat-input-row input:focus { border-color: var(--accent); }
    .chat-input-row input::placeholder { color: var(--muted); }
    .chat-input-row button {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.875rem;
      transition: opacity 0.2s;
    }
    .chat-input-row button:hover { opacity: 0.85; }

    @media (max-width: 768px) {
      .layout { flex-direction: column; }
      .ai-section { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <h1>TaskFlow AI</h1>
    <p>Manage tasks smarter with AI assistance</p>
  </header>

  <div class="layout">
    <!-- Todo Section -->
    <div class="todo-section">
      <div class="section-title">📋 My Tasks</div>
      <div class="input-row">
        <input type="text" id="taskInput" placeholder="What needs to be done?"/>
        <button onclick="addTask()">+ Add</button>
      </div>
      <div class="stats">
        <div class="stat"><div class="num" id="totalCount">0</div><div class="label">Total</div></div>
        <div class="stat"><div class="num" id="pendingCount">0</div><div class="label">Pending</div></div>
        <div class="stat"><div class="num" id="doneCount">0</div><div class="label">Done</div></div>
      </div>
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
        <button class="filter-btn" onclick="setFilter('done', this)">Completed</button>
      </div>
      <div class="task-list" id="taskList"></div>
    </div>

    <!-- AI Section -->
    <div class="ai-section">
      <div class="section-title">🤖 AI Assistant</div>
      <div class="ai-box">
        <div class="ai-header">
          <div class="ai-dot"></div>
          <span>TaskFlow AI</span>
          <small>Powered by Groq</small>
        </div>
        <div class="chat-messages" id="chatMessages">
          <div class="msg ai">👋 Hi! I'm your AI assistant. Ask me to help with your tasks — I can suggest priorities, break down tasks, or just answer questions!</div>
        </div>
        <div class="chat-input-row">
          <input type="text" id="chatInput" placeholder="Ask me anything..."/>
          <button onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let tasks = [];
    let filter = 'all';

    async function loadTasks() {
      const res = await fetch('/tasks');
      tasks = await res.json();
      render();
    }

    async function addTask() {
      const input = document.getElementById('taskInput');
      const title = input.value.trim();
      if (!title) return;
      const res = await fetch('/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      const task = await res.json();
      tasks.push(task);
      input.value = '';
      render();
    }

    async function toggleTask(id) {
      const res = await fetch(`/tasks/${id}`, { method: 'PUT' });
      const updated = await res.json();
      tasks = tasks.map(t => t.id === id ? updated : t);
      render();
    }

    async function deleteTask(id) {
      await fetch(`/tasks/${id}`, { method: 'DELETE' });
      tasks = tasks.filter(t => t.id !== id);
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const total = tasks.length;
      const done = tasks.filter(t => t.done).length;
      document.getElementById('totalCount').textContent = total;
      document.getElementById('pendingCount').textContent = total - done;
      document.getElementById('doneCount').textContent = done;

      const filtered = tasks.filter(t => {
        if (filter === 'pending') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      const list = document.getElementById('taskList');
      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty"><span>✅</span>No tasks here. ${filter === 'all' ? 'Add one above!' : ''}</div>`;
        return;
      }
      list.innerHTML = filtered.map(t => `
        <div class="task-item ${t.done ? 'done' : ''}">
          <button class="check-btn" onclick="toggleTask(${t.id})">✓</button>
          <span class="task-title">${t.title}</span>
          <button class="del-btn" onclick="deleteTask(${t.id})">✕</button>
        </div>
      `).join('');
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      if (!message) return;

      const chatMessages = document.getElementById('chatMessages');

      // Add user message
      chatMessages.innerHTML += `<div class="msg user">${message}</div>`;
      input.value = '';

      // Add typing indicator
      chatMessages.innerHTML += `<div class="msg ai typing" id="typing">AI is thinking...</div>`;
      chatMessages.scrollTop = chatMessages.scrollHeight;

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });
        const data = await res.json();

        // Remove typing indicator
        document.getElementById('typing').remove();

        // Add AI response
        chatMessages.innerHTML += `<div class="msg ai">${data.reply || data.error}</div>`;
      } catch (e) {
        document.getElementById('typing').remove();
        chatMessages.innerHTML += `<div class="msg ai">Sorry, something went wrong!</div>`;
      }

      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    document.getElementById('taskInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') addTask();
    });

    document.getElementById('chatInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });

    loadTasks();
  </script>
</body>
</html>
