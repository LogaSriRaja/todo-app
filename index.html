<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13;
      --card: #1a1a22;
      --border: #2a2a36;
      --accent: #7c6fff;
      --accent2: #ff6f91;
      --text: #e8e8f0;
      --muted: #7a7a90;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding: 24px 16px; }
    header { text-align: center; margin-bottom: 24px; }
    header h1 { font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    header p { color: var(--muted); margin-top: 6px; font-size: 0.9rem; }
    .layout { display: flex; gap: 20px; max-width: 1200px; margin: 0 auto; }
    .todo-section { flex: 1; }
    .ai-wrapper { display: flex; gap: 0; width: 520px; background: var(--card); border: 0.5px solid var(--border); border-radius: 16px; overflow: hidden; }

    /* Sidebar */
    .sidebar { width: 160px; border-right: 0.5px solid var(--border); display: flex; flex-direction: column; }
    .sidebar-header { padding: 12px; border-bottom: 0.5px solid var(--border); }
    .new-chat-btn { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 8px; padding: 8px; color: #fff; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .new-chat-btn:hover { opacity: 0.85; }
    .sidebar-title { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 10px 12px 6px; }
    .session-list { flex: 1; overflow-y: auto; padding: 4px; }
    .session-list::-webkit-scrollbar { width: 3px; }
    .session-list::-webkit-scrollbar-thumb { background: var(--border); }
    .session-item { padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 0.78rem; color: var(--muted); transition: all 0.2s; display: flex; align-items: center; justify-content: space-between; gap: 4px; margin-bottom: 2px; }
    .session-item:hover { background: #22222e; color: var(--text); }
    .session-item.active { background: #22222e; color: var(--text); border-left: 2px solid var(--accent); }
    .session-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .del-session { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 0.7rem; padding: 2px 4px; border-radius: 4px; opacity: 0; transition: opacity 0.2s; }
    .session-item:hover .del-session { opacity: 1; }
    .del-session:hover { color: var(--accent2); }

    /* Chat area */
    .ai-section { flex: 1; display: flex; flex-direction: column; height: 600px; }
    .ai-header { padding: 14px 16px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .ai-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px #4ade80; }
    .ai-header span { font-weight: 600; font-size: 0.88rem; }
    .ai-header small { color: var(--muted); font-size: 0.72rem; margin-left: auto; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
    .chat-messages::-webkit-scrollbar { width: 3px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); }
    .msg { max-width: 85%; padding: 9px 13px; border-radius: 12px; font-size: 0.855rem; line-height: 1.5; animation: slideIn 0.2s ease; }
    .msg.user { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.ai { background: #22222e; color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; border: 0.5px solid var(--border); }
    .msg.typing { color: var(--muted); font-style: italic; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    .chat-input-row { padding: 12px; border-top: 0.5px solid var(--border); display: flex; gap: 8px; }
    .chat-input-row input { flex: 1; background: #22222e; border: 0.5px solid var(--border); border-radius: 10px; padding: 9px 13px; color: var(--text); font-size: 0.855rem; font-family: 'Inter', sans-serif; outline: none; }
    .chat-input-row input:focus { border-color: var(--accent); }
    .chat-input-row input::placeholder { color: var(--muted); }
    .chat-input-row button { background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 10px; padding: 9px 16px; color: #fff; font-weight: 600; cursor: pointer; font-size: 0.855rem; transition: opacity 0.2s; }
    .chat-input-row button:hover { opacity: 0.85; }

    /* Todo section */
    .section-title { font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
    .input-row { display: flex; gap: 10px; margin-bottom: 18px; }
    .input-row input { flex: 1; background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; padding: 12px 16px; color: var(--text); font-size: 0.9rem; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
    .input-row input:focus { border-color: var(--accent); }
    .input-row input::placeholder { color: var(--muted); }
    .input-row button { background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 12px; padding: 12px 18px; color: #fff; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: opacity 0.2s; }
    .input-row button:hover { opacity: 0.85; }
    .stats { display: flex; gap: 10px; margin-bottom: 16px; }
    .stat { flex: 1; background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
    .stat .num { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--accent); }
    .stat .label { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .filters { display: flex; gap: 8px; margin-bottom: 12px; }
    .filter-btn { background: var(--card); border: 0.5px solid var(--border); border-radius: 8px; padding: 6px 14px; color: var(--muted); font-size: 0.82rem; cursor: pointer; transition: all 0.2s; }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .task-list { display: flex; flex-direction: column; gap: 8px; }
    .task-item { background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; padding: 13px 15px; display: flex; align-items: center; gap: 12px; animation: slideIn 0.2s ease; transition: border-color 0.2s; }
    .task-item:hover { border-color: var(--accent); }
    .task-item.done { opacity: 0.5; }
    .check-btn { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border); background: transparent; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; color: transparent; font-size: 11px; }
    .task-item.done .check-btn { background: var(--accent); border-color: var(--accent); color: #fff; }
    .task-title { flex: 1; font-size: 0.88rem; }
    .task-item.done .task-title { text-decoration: line-through; color: var(--muted); }
    .del-btn { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 0.95rem; padding: 4px; border-radius: 6px; transition: color 0.2s; }
    .del-btn:hover { color: var(--accent2); }
    .empty { text-align: center; color: var(--muted); padding: 36px 0; font-size: 0.88rem; }
    .empty span { display: block; font-size: 2rem; margin-bottom: 10px; }
    @media (max-width: 768px) { .layout { flex-direction: column; } .ai-wrapper { width: 100%; } }
  </style>
</head>
<body>
  <header>
    <h1>TaskFlow AI</h1>
    <p>Manage tasks smarter with AI assistance</p>
  </header>

  <div class="layout">
    <!-- Todo Section -->
    <div class="todo-section">
      <div class="section-title">My Tasks</div>
      <div class="input-row">
        <input type="text" id="taskInput" placeholder="What needs to be done?"/>
        <button onclick="addTask()">+ Add</button>
      </div>
      <div class="stats">
        <div class="stat"><div class="num" id="totalCount">0</div><div class="label">Total</div></div>
        <div class="stat"><div class="num" id="pendingCount">0</div><div class="label">Pending</div></div>
        <div class="stat"><div class="num" id="doneCount">0</div><div class="label">Done</div></div>
      </div>
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
        <button class="filter-btn" onclick="setFilter('done', this)">Completed</button>
      </div>
      <div class="task-list" id="taskList"></div>
    </div>

    <!-- AI Section -->
    <div class="ai-wrapper">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="sidebar-header">
          <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
        </div>
        <div class="sidebar-title">History</div>
        <div class="session-list" id="sessionList"></div>
      </div>

      <!-- Chat -->
      <div class="ai-section">
        <div class="ai-header">
          <div class="ai-dot"></div>
          <span>TaskFlow AI</span>
          <small>Powered by Groq</small>
        </div>
        <div class="chat-messages" id="chatMessages">
          <div class="msg ai">👋 Hi! I am your AI assistant. Ask me to help with your tasks!</div>
        </div>
        <div class="chat-input-row">
          <input type="text" id="chatInput" placeholder="Ask me anything..."/>
          <button onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let tasks = [];
    let filter = 'all';
    let currentSessionId = null;

    // ── Tasks ──────────────────────────────────────────
    async function loadTasks() {
      const res = await fetch('/tasks');
      tasks = await res.json();
      render();
    }

    async function addTask() {
      const input = document.getElementById('taskInput');
      const title = input.value.trim();
      if (!title) return;
      const res = await fetch('/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      const task = await res.json();
      tasks.push(task);
      input.value = '';
      render();
    }

    async function toggleTask(id) {
      const res = await fetch(`/tasks/${id}`, { method: 'PUT' });
      const updated = await res.json();
      tasks = tasks.map(t => t.id === id ? updated : t);
      render();
    }

    async function deleteTask(id) {
      await fetch(`/tasks/${id}`, { method: 'DELETE' });
      tasks = tasks.filter(t => t.id !== id);
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const total = tasks.length;
      const done = tasks.filter(t => t.done).length;
      document.getElementById('totalCount').textContent = total;
      document.getElementById('pendingCount').textContent = total - done;
      document.getElementById('doneCount').textContent = done;
      const filtered = tasks.filter(t => {
        if (filter === 'pending') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });
      const list = document.getElementById('taskList');
      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty"><span>✅</span>No tasks here. ${filter === 'all' ? 'Add one above!' : ''}</div>`;
        return;
      }
      list.innerHTML = filtered.map(t => `
        <div class="task-item ${t.done ? 'done' : ''}">
          <button class="check-btn" onclick="toggleTask(${t.id})">✓</button>
          <span class="task-title">${t.title}</span>
          <button class="del-btn" onclick="deleteTask(${t.id})">✕</button>
        </div>
      `).join('');
    }

    // ── Sessions ───────────────────────────────────────
    async function loadSessions() {
      const res = await fetch('/sessions');
      const sessions = await res.json();
      const list = document.getElementById('sessionList');
      if (sessions.length === 0) {
        list.innerHTML = `<div style="padding:10px;font-size:0.75rem;color:var(--muted);text-align:center">No history yet</div>`;
        return;
      }
      list.innerHTML = sessions.map(s => `
        <div class="session-item ${s.session_id === currentSessionId ? 'active' : ''}" onclick="loadSession('${s.session_id}')">
          <span class="session-name">${s.session_name || 'Chat'}</span>
          <button class="del-session" onclick="deleteSession(event, '${s.session_id}')">✕</button>
        </div>
      `).join('');
    }

    async function loadSession(sessionId) {
      currentSessionId = sessionId;
      const res = await fetch(`/sessions/${sessionId}`);
      const chats = await res.json();
      const chatMessages = document.getElementById('chatMessages');
      chatMessages.innerHTML = '';
      chats.forEach(chat => {
        chatMessages.innerHTML += `<div class="msg user">${chat.user_message}</div>`;
        chatMessages.innerHTML += `<div class="msg ai">${chat.ai_reply}</div>`;
      });
      chatMessages.scrollTop = chatMessages.scrollHeight;
      loadSessions();
    }

    async function deleteSession(e, sessionId) {
      e.stopPropagation();
      await fetch(`/sessions/${sessionId}`, { method: 'DELETE' });
      if (currentSessionId === sessionId) {
        newChat();
      }
      loadSessions();
    }

    function newChat() {
      currentSessionId = null;
      document.getElementById('chatMessages').innerHTML = '<div class="msg ai">👋 Hi! I am your AI assistant. Ask me to help with your tasks!</div>';
      loadSessions();
    }

    // ── Chat ───────────────────────────────────────────
    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      if (!message) return;

      const chatMessages = document.getElementById('chatMessages');
      chatMessages.innerHTML += `<div class="msg user">${message}</div>`;
      input.value = '';

      if (!currentSessionId) {
        currentSessionId = 'session_' + Date.now();
      }

      chatMessages.innerHTML += `<div class="msg ai typing" id="typing">AI is thinking...</div>`;
      chatMessages.scrollTop = chatMessages.scrollHeight;

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message,
            session_id: currentSessionId,
            session_name: message.substring(0, 30)
          })
        });
        const data = await res.json();
        document.getElementById('typing').remove();
        chatMessages.innerHTML += `<div class="msg ai">${data.reply || data.error}</div>`;
        chatMessages.scrollTop = chatMessages.scrollHeight;
        loadSessions();
      } catch (e) {
        document.getElementById('typing').remove();
        chatMessages.innerHTML += `<div class="msg ai">Sorry, something went wrong!</div>`;
      }
    }

    document.getElementById('taskInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') addTask();
    });
    document.getElementById('chatInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });

    loadTasks();
    loadSessions();
  </script>
</body>
</html>
