<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Stay on Track</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --card: #1a1a22;
      --border: #2a2a36;
      --accent: #7c6fff;
      --accent2: #ff6f91;
      --text: #e8e8f0;
      --muted: #7a7a90;
      --done: #3a3a4a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }

    header p {
      color: var(--muted);
      margin-top: 8px;
      font-size: 0.95rem;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .input-row input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: var(--accent);
    }

    .input-row input::placeholder { color: var(--muted); }

    .input-row button {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      padding: 14px 22px;
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .input-row button:hover { opacity: 0.9; transform: translateY(-1px); }
    .input-row button:active { transform: translateY(0); }

    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }

    .stat .num {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat .label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filter-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 16px;
      color: var(--muted);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .task-list { display: flex; flex-direction: column; gap: 10px; }

    .task-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: slideIn 0.25s ease;
      transition: border-color 0.2s;
    }

    .task-item:hover { border-color: var(--accent); }

    .task-item.done { opacity: 0.5; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .check-btn {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      color: transparent;
      font-size: 13px;
    }

    .task-item.done .check-btn {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .task-title {
      flex: 1;
      font-size: 0.95rem;
      transition: color 0.2s;
    }

    .task-item.done .task-title {
      text-decoration: line-through;
      color: var(--muted);
    }

    .del-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }

    .del-btn:hover { color: var(--accent2); background: rgba(255,111,145,0.1); }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 48px 0;
      font-size: 0.95rem;
    }

    .empty span { display: block; font-size: 2.5rem; margin-bottom: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>TaskFlow</h1>
    <p>Capture it. Complete it. Move on.</p>
  </header>

  <div class="container">
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="What needs to be done?" />
      <button onclick="addTask()">+ Add</button>
    </div>

    <div class="stats">
      <div class="stat"><div class="num" id="totalCount">0</div><div class="label">Total</div></div>
      <div class="stat"><div class="num" id="pendingCount">0</div><div class="label">Pending</div></div>
      <div class="stat"><div class="num" id="doneCount">0</div><div class="label">Completed</div></div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Completed</button>
    </div>

    <div class="task-list" id="taskList"></div>
  </div>

  <script>
    let tasks = [];
    let filter = 'all';

    async function loadTasks() {
      const res = await fetch('/tasks');
      tasks = await res.json();
      render();
    }

    async function addTask() {
      const input = document.getElementById('taskInput');
      const title = input.value.trim();
      if (!title) return;
      const res = await fetch('/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      const task = await res.json();
      tasks.push(task);
      input.value = '';
      render();
    }

    async function toggleTask(id) {
      const res = await fetch(`/tasks/${id}`, { method: 'PUT' });
      const updated = await res.json();
      tasks = tasks.map(t => t.id === id ? updated : t);
      render();
    }

    async function deleteTask(id) {
      await fetch(`/tasks/${id}`, { method: 'DELETE' });
      tasks = tasks.filter(t => t.id !== id);
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const list = document.getElementById('taskList');
      const total = tasks.length;
      const done = tasks.filter(t => t.done).length;
      document.getElementById('totalCount').textContent = total;
      document.getElementById('pendingCount').textContent = total - done;
      document.getElementById('doneCount').textContent = done;

      const filtered = tasks.filter(t => {
        if (filter === 'pending') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty"><span>✅</span>No tasks here. ${filter === 'all' ? 'Add one above!' : ''}</div>`;
        return;
      }

      list.innerHTML = filtered.map(t => `
        <div class="task-item ${t.done ? 'done' : ''}">
          <button class="check-btn" onclick="toggleTask(${t.id})">✓</button>
          <span class="task-title">${t.title}</span>
          <button class="del-btn" onclick="deleteTask(${t.id})">✕</button>
        </div>
      `).join('');
    }

    document.getElementById('taskInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') addTask();
    });

    loadTasks();
  </script>
</body>
</html>
